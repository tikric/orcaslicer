<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrcaSlicer Pro Course and Calibration Simulator</title>
  <script>
    // Single-page app redirect for GitHub Pages
    // When a user navigates directly to a route like /orcaslicer/curso,
    // GitHub Pages returns this 404.html. We redirect to index.html
    // with the route encoded in the query string so the SPA can handle it.
    var pathSegmentsToKeep = 1; // Keep /orcaslicer/ in the path
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
